<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Timer</title>
    
    <!-- كود الصورة المصغرة الخاصة بك (Favicon) للمتصفح من الأعلى -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/KxRJyWnp/st-photo-png.png">
    
    <style id="dynamicStyle">
        body { 
            background: #0f0f16; 
            color: #a6e3a1; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            transition: background 0.5s, color 0.5s;
        }

        /* ثيم وضع الاستراحة المخصص */
        body.break-theme {
            background: #110f18;
            color: #cba6f7; 
        }

        /* اسم الموقع بشكل بسيط وأنيق وثابت */
        .brand-title {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #a6e3a1;
            transition: color 0.5s;
        }
        body.break-theme .brand-title {
            color: #cba6f7;
        }

        /* حقوق الملكية الاحترافية البسيطة في الأسفل */
        .footer-credits {
            position: absolute;
            bottom: 25px;
            font-size: 0.85rem;
            color: #585b70;
            letter-spacing: 0.5px;
            font-family: 'Segoe UI', sans-serif;
        }

        /* واجهة التايمر الرئيسية */
        #mainApp { text-align: center; width: 100%; }
        
        /* قسم المؤقتات */
        .timer-box { display: none; }
        .timer-box.active { display: block; }

        .timer-display { font-size: 6rem; font-weight: bold; text-shadow: 0 0 20px rgba(166, 227, 161, 0.3); margin-bottom: 10px; }
        body.break-theme .timer-display { text-shadow: 0 0 20px rgba(203, 166, 247, 0.3); }
        
        /* مدخلات وقت الاستراحة */
        .break-input-group {
            margin-bottom: 15px;
        }
        .break-input-group label {
            font-size: 0.95rem;
            opacity: 0.8;
        }
        .break-input-group input {
            background: #181825;
            border: 1px solid #313244;
            padding: 8px 12px;
            border-radius: 8px;
            color: #cdd6f4;
            width: 70px;
            text-align: center;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .break-input-group input:focus {
            border-color: #cba6f7;
        }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        
        /* الأزرار وتأثيراتها حسب الوضع */
        button { 
            padding: 12px 25px; 
            cursor: pointer; 
            border-radius: 25px; 
            border: 1px solid #a6e3a1; 
            background: #1e1e2e; 
            color: #a6e3a1; 
            font-weight: bold; 
            transition: 0.3s; 
            font-family: inherit;
        }
        button:hover { background: #a6e3a1; color: #11111b; box-shadow: 0 0 15px rgba(166, 227, 161, 0.4); }
        
        body.break-theme button {
            border-color: #cba6f7;
            color: #cba6f7;
        }
        body.break-theme button:hover {
            background: #cba6f7;
            color: #11111b;
            box-shadow: 0 0 15px rgba(203, 166, 247, 0.4);
        }

        /* أزرار خاصة للتحويل بين المودات */
        #breakModeBtn { background: #110f18; color: #cba6f7; border-color: #cba6f7; }
        #studyModeBtn { background: #0f0f16; color: #a6e3a1; border-color: #a6e3a1; }
    </style>
</head>
<body>

    <!-- اسم الموقع البسيط الثابت في الصفحة -->
    <div class="brand-title" id="appTitle">Study Timer</div>

    <div id="mainApp">
        <!-- مؤقت الدراسة (الافتراضي) -->
        <div id="studyContainer" class="timer-box active">
            <div id="studyDisplay" class="timer-display">00:00:00</div>
            <div class="controls">
                <button onclick="startStudy()">Start</button>
                <button onclick="pauseStudy()">Pause</button>
                <button onclick="endStudy()">End</button>
                <button onclick="requestMini('studyDisplay')">Mini</button>
                <button id="breakModeBtn" onclick="switchMode('break')">Break Mode ☕</button>
            </div>
        </div>

        <!-- مؤقت الاستراحة (المنفصل) -->
        <div id="breakContainer" class="timer-box">
            <div id="breakDisplay" class="timer-display">00:05:00</div>
            <div class="break-input-group">
                <label>Set Minutes: </label>
                <input type="number" id="breakMinutesInput" value="5" min="1" max="180" onchange="setBreakDuration()">
            </div>
            <div class="controls">
                <button onclick="startBreak()">Start</button>
                <button onclick="pauseBreak()">Pause</button>
                <button onclick="endBreak()">Reset</button>
                <button onclick="requestMini('breakDisplay')">Mini</button>
                <button id="studyModeBtn" onclick="switchMode('study')">Study Mode 📚</button>
            </div>
        </div>
    </div>

    <!-- الحقوق الاحترافية البسيطة في الأسفل خالص -->
    <div class="footer-credits">
        © 2026 Amr Abdelhalim . All Rights Reserved
    </div>

    <!-- العناصر المخفية المسؤولة عن الـ Mini Mode -->
    <canvas id="videoCanvas" width="360" height="150" style="display:none;"></canvas>
    <video id="pipVideo" width="360" height="150" autoplay muted loop style="display:none;"></video>

    <script>
        // داتا مؤقت الدراسة (تصاعدي)
        let studySeconds = parseInt(localStorage.getItem('savedStudySeconds')) || 0;
        let studyTimerId = null;

        // داتا مؤقت الاستراحة (تنازلي)
        let breakSeconds = 300; 
        let breakTimerId = null;
        let currentActiveMode = 'study'; 

        // رابط صوت عمرو المباشر من catbox
        const MY_AUDIO_URL = "https://files.catbox.moe/d5k1bg.mp3"; 
        let customAudio = new Audio(MY_AUDIO_URL);
        let audioStopTimeout = null;

        window.onload = function() {
            document.title = "Study Timer";
            updateStudyDisplay();
            setBreakDuration();
            setupPipStream();
        }

        function setupPipStream() {
            const canvas = document.getElementById('videoCanvas');
            const video = document.getElementById('pipVideo');
            const stream = canvas.captureStream(10);
            video.srcObject = stream;
        }

        // --- نظام التبديل بين المودات والواجهات ---
        function switchMode(mode) {
            currentActiveMode = mode;
            const body = document.body;
            
            if(mode === 'break') {
                body.classList.add('break-theme');
                document.getElementById('studyContainer').classList.remove('active');
                document.getElementById('breakContainer').classList.add('active');
            } else {
                body.classList.remove('break-theme');
                document.getElementById('breakContainer').classList.remove('active');
                document.getElementById('studyContainer').classList.add('active');
                stopAlarm(); 
            }
            if(document.pictureInPictureElement) {
                updatePipCanvas(mode === 'break' ? 'breakDisplay' : 'studyDisplay');
            }
        }

        // --- منطق مؤقت الدراسة (Study Timer - نظام HH:MM:SS) ---
        function updateStudyDisplay() {
            let hours = Math.floor(studySeconds / 3600);
            let mins = Math.floor((studySeconds % 3600) / 60);
            let secs = studySeconds % 60;
            let timeStr = `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('studyDisplay').innerText = timeStr;
            localStorage.setItem('savedStudySeconds', studySeconds);
        }

        function startStudy() { 
            if(!studyTimerId) {
                studyTimerId = setInterval(()=>{ 
                    studySeconds++; 
                    updateStudyDisplay(); 

                    // تنبيه مخصص بصوتك عند اكتمال كل ساعة مذاكرة بالظبط
                    if (studySeconds > 0 && studySeconds % 3600 === 0) {
                        playAlarm("عاش يا بطل! كملت ساعة كاملة مذاكرة بنجاح.. استمر! 🎯");
                    }

                    if(document.pictureInPictureElement && currentActiveMode === 'study') {
                        updatePipCanvas('studyDisplay');
                    }
                }, 1000); 
            } 
        }
        function pauseStudy() { clearInterval(studyTimerId); studyTimerId = null; }
        function endStudy() { pauseStudy(); studySeconds = 0; updateStudyDisplay(); if(document.pictureInPictureElement && currentActiveMode === 'study') updatePipCanvas('studyDisplay'); }

        // --- منطق مؤقت الاستراحة (Break Timer - نظام HH:MM:SS) ---
        function setBreakDuration() {
            const minsInput = parseInt(document.getElementById('breakMinutesInput').value) || 5;
            breakSeconds = minsInput * 60;
            updateBreakDisplay();
        }

        function updateBreakDisplay() {
            let hours = Math.floor(breakSeconds / 3600);
            let mins = Math.floor((breakSeconds % 3600) / 60);
            let secs = breakSeconds % 60;
            let timeStr = `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('breakDisplay').innerText = timeStr;
        }

        function startBreak() {
            stopAlarm();
            if(!breakTimerId) {
                breakTimerId = setInterval(()=>{
                    if(breakSeconds > 0) {
                        breakSeconds--;
                        updateBreakDisplay();
                        if(document.pictureInPictureElement && currentActiveMode === 'break') {
                            updatePipCanvas('breakDisplay');
                        }
                    } else {
                        pauseBreak();
                        playAlarm("وقت الاستراحة انتهى! حان وقت العودة للجد وعمرو مستنيك! 📚");
                    }
                }, 1000);
            }
        }
        function pauseBreak() { clearInterval(breakTimerId); breakTimerId = null; }
        function endBreak() { pauseBreak(); setBreakDuration(); stopAlarm(); if(document.pictureInPictureElement && currentActiveMode === 'break') updatePipCanvas('breakDisplay'); }

        // --- نظام تشغيل الصوت المخصص والإشعارات الذكية ---
        function playAlarm(notificationText) {
            if(audioStopTimeout) clearTimeout(audioStopTimeout);
            customAudio.pause();
            customAudio.currentTime = 0;
            
            customAudio.play().catch(e => console.log("خطأ في تشغيل الصوت التلقائي: ", e));

            audioStopTimeout = setTimeout(() => {
                stopAlarm();
            }, 12000);

            if (Notification.permission === "granted") {
                new Notification("Study Timer", { body: notificationText });
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        new Notification("Study Timer", { body: notificationText });
                    }
                });
            }
        }

        function stopAlarm() {
            if(audioStopTimeout) clearTimeout(audioStopTimeout);
            customAudio.pause();
            customAudio.currentTime = 0;
        }

        // --- نظام الـ Mini Player الذكي والمحدث (توسيع الحجم لـ 3 خانات) ---
        function updatePipCanvas(targetDisplayId) {
            const canvas = document.getElementById('videoCanvas');
            const ctx = canvas.getContext('2d');
            const textColor = (targetDisplayId === 'breakDisplay') ? "#cba6f7" : "#a6e3a1";
            
            ctx.fillStyle = "#0f0f16"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = textColor; 
            ctx.font = "bold 44px Courier New"; // تعديل الخط ليتناسب مع الخانات الثلاثة
            ctx.textAlign = "center"; 
            ctx.fillText(document.getElementById(targetDisplayId).innerText, canvas.width/2, 90);
        }

        async function requestMini(targetDisplayId) {
            const video = document.getElementById('pipVideo');
            
            try {
                updatePipCanvas(targetDisplayId);
                
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else {
                    await video.play();
                    await video.requestPictureInPicture();
                    
                    setInterval(() => {
                        if(document.pictureInPictureElement) {
                            updatePipCanvas(currentActiveMode === 'break' ? 'breakDisplay' : 'studyDisplay');
                        }
                    }, 500);
                }
            } catch (error) {
                console.error("فشل وضع التايمر المصغر: ", error);
                alert("تأكد من الضغط على زر Start أولاً لتفعيل الواجهة قبل تشغيل الـ Mini!");
            }
        }
    </script>
</body>
</html>
